name: Auto-Scrape Dynamic Links

on:
  schedule:
    # Ye script roz raat 12:00 AM UTC par run hogi
    - cron: '0 0 * * *'
  workflow_dispatch: # Isse aap manually GitHub se bhi button click karke run kar sakte ho

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # repo me wapas json file commit karne ki permission

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Scraper Script
        run: npm run scrape
        
      - name: Commit and Push Updated Links
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dynamic-links.json
          git commit -m "🤖 Auto-update dynamic movie links" || exit 0
          git push
