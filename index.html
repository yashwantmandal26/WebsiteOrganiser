<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>WebsiteOrganiser</title>

  <!-- PWA Meta Tags -->
  <meta name="application-name" content="WebsiteOrganiser">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WebsiteOrganiser">
  <meta name="description"
    content="Save and organize your favorite websites and keywords with smart categorization and cloud sync.">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="msapplication-TileColor" content="#7b2cbf">
  <meta name="msapplication-tap-highlight" content="no">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="//www.gstatic.com">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.google.com" crossorigin>
  <link rel="dns-prefetch" href="//www.google.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="style.css?v=130">
  <link rel="stylesheet" href="add-keyword-modal.css?v=68">
  <link rel="stylesheet" href="search-bar-update.css?v=82">
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#7b2cbf">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#7b2cbf">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" type="image/png" href="media/logo.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="media/logo.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icon-192.png">

</head>

<body>

  <header>
    <div class="header-row">
      <div class="header-left">
        <a href="./" class="site-logo-link" title="Tap the red dot on the WebsiteOrganiser icon to refresh cached changes">
          <img src="media/logo.png" alt="WebsiteOrganiser Logo" class="site-logo">
          <span class="site-logo-refresh-dot" aria-hidden="true" hidden></span>
        </a>
        <div class="header-brand">
          <span class="site-title">WebsiteOrganiser</span>
        </div>
      </div>

      <!-- Row 2: Timer + Theme Toggle -->
      <div class="header-controls">
        <div class="live-clock" id="live-clock" aria-live="polite" aria-label="Current time">
          <span class="clock-hours" id="clock-hh">12</span><span class="clock-sep">:</span><span class="clock-minutes" id="clock-mm">00</span><span class="clock-sep">:</span><span class="clock-seconds" id="clock-ss">00</span><span class="clock-ampm" id="clock-ampm">&nbsp;AM</span>
        </div>
        <div class="header-right">
          <button id="export-btn" class="btn holo-btn admin-only" style="display: none;">📤 Export</button>
          <button id="import-btn" class="btn holo-btn admin-only" style="display: none;">📥 Import</button>
          <input type="file" id="import-file-input" accept=".json" style="display: none;">
          <button id="theme-toggle-btn" class="btn icon-btn holo-btn"><img src="media/theme.png" alt="Theme"
              class="theme-icon"></button>
        </div>
      </div>
      <!-- Row 3: Search Bar -->
      <div class="search-bar-container">
        <div class="search-bar-wrapper">
          <input type="text" id="google-search-input" class="google-search-input"
            placeholder="Search websites or Google..."
            autocomplete="new-password" spellcheck="false">

          <button type="button" id="search-submit-btn" class="search-submit-btn" aria-label="Search"
            title="Search">
            <img src="media/google.png" alt="" class="search-icon">
          </button>
          <button id="clear-search-btn" class="clear-search-btn" style="display: none;" title="Clear">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>

        <!-- Suggestions Dropdown -->
        <div id="search-suggestions" class="search-suggestions" style="display: none;">
          <!-- Dynamically populated -->
        </div>
      </div>
    </div>
  </header>

  <!-- PWA Installation Prompt -->
  <!-- PWA Installation Prompt removed -->



  <main class="container">
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
      <div class="lo-bg-orbs">
        <span class="lo-orb lo-orb1"></span>
        <span class="lo-orb lo-orb2"></span>
        <span class="lo-orb lo-orb3"></span>
      </div>
      <div class="lo-card">
        <div class="lo-logo-wrap">
          <svg class="lo-logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="48" height="48" rx="14" fill="url(#lg1)"/>
            <rect x="10" y="10" width="12" height="12" rx="4" fill="#fff" fill-opacity="0.9"/>
            <rect x="26" y="10" width="12" height="12" rx="4" fill="#fff" fill-opacity="0.7"/>
            <rect x="10" y="26" width="12" height="12" rx="4" fill="#fff" fill-opacity="0.7"/>
            <rect x="26" y="26" width="12" height="12" rx="4" fill="#fff" fill-opacity="0.5"/>
            <defs>
              <linearGradient id="lg1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                <stop stop-color="#7b2cbf"/>
                <stop offset="1" stop-color="#a855f7"/>
              </linearGradient>
            </defs>
          </svg>
          <div class="lo-logo-pulse"></div>
        </div>
        <div class="lo-brand">
          <span class="lo-brand-website">Website</span><span class="lo-brand-organiser">Organiser</span>
        </div>
        <div class="lo-bar-track">
          <div class="lo-bar-fill"></div>
        </div>
        <p class="loading-text">Loading your websites…</p>
      </div>
    </div>

    <div id="groups-container" class="groups-grid">
      <!-- Keyword groups will be dynamically inserted here -->
    </div>
  </main>

  <button id="add-fab" class="fab">+</button>

  <!-- Modal for adding a keyword to a group -->
  <div id="add-keyword-modal" class="modal-container">
    <div class="modal-content">
      <h2><img src="media/rename.png" style="width:24px;height:24px;margin-right:10px;vertical-align:middle;">Add Keyword</h2>
      <input type="text" id="add-keyword-input" placeholder="Enter name or link..." autocomplete="off">
      <input type="text" id="add-keyword-desc-input" placeholder="Give a comment..." style="margin-top: 10px;" autocomplete="off">
      <div class="modal-actions">
        <button id="add-keyword-save-btn" class="btn">Add</button>
        <button id="add-keyword-cancel-btn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Modal for adding/editing a group -->
  <div id="group-modal" class="modal-container">
    <div class="modal-content">
      <h2 id="group-modal-title"><img src="media/rename.png" style="width:24px;height:24px;margin-right:10px;vertical-align:middle;">Create New Group</h2>
      <input type="text" id="group-name-input" placeholder="Enter group name...">
      <div class="modal-actions">
        <button id="save-group-btn" class="btn" onclick="if(window.saveGroup)window.saveGroup()">Save</button>
        <button id="cancel-group-btn" class="btn btn-secondary"
          onclick="if(window.closeGroupModal)window.closeGroupModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Modal for managing keywords -->
  <!-- Remove unrelated keyword modal, only use add-keyword-modal for group add -->

  <!-- Admin Login Modal -->
  <div id="admin-modal" class="modal-container">
    <form id="admin-login-form" class="modal-content" style="margin:0; width:100%;">
      <h2>🔐 Admin Login</h2>
      <input type="email" id="admin-id-input" placeholder="Enter admin email..." autocomplete="email">
      <div class="password-input-wrapper">
        <input type="password" id="admin-password-input" placeholder="Enter password..." autocomplete="current-password">
        <button type="button" id="password-peek-btn" class="password-peek-btn" title="Show/Hide password" aria-label="Toggle password visibility">
          <!-- Eye icon (show) -->
          <svg id="peek-eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <!-- Eye-off icon (hide) — hidden by default -->
          <svg id="peek-eye-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <p id="admin-error-msg" style="color: #ff6b6b; display: none; margin: 8px 0;">Invalid credentials</p>
      <div class="modal-actions">
        <button type="button" id="admin-google-login-btn" class="btn" style="background: #4285F4 !important; color: white !important; display: flex; align-items: center; justify-content: center; gap: 8px; border: none; padding: 0 16px;">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#fff" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.91a8.78 8.78 0 0 0 2.69-6.6z"/><path fill="#fff" d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.91-2.26a5.58 5.58 0 0 1-8.54-3v-2.26H.58v2.26A9 9 0 0 0 9 18z"/><path fill="#fff" d="M3.51 10.54a5.4 5.4 0 0 1 0-3.47V4.81H.58a9 9 0 0 0 0 8.37l2.93-2.64z"/><path fill="#fff" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.47.89 11.43 0 9 0 5.48 0 2.45 2.02.58 4.81l2.93 2.64a5.52 5.52 0 0 1 5.49-3.87z"/></svg>
          Google
        </button>
        <button type="submit" id="admin-login-btn" class="btn">Login</button>
        <button type="button" id="admin-cancel-btn" class="btn btn-secondary">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Rename Keyword Modal -->
  <div id="rename-modal" class="modal-container">
    <div class="modal-content">
      <h2 id="rename-modal-title">Edit Keyword</h2>
      <input type="text" id="rename-keyword-input" placeholder="Enter new name or link...">
      <input type="text" id="rename-keyword-desc-input" placeholder="Give a comment..." style="margin-top: 10px;">
      <div class="modal-actions">
        <button id="rename-save-btn" class="btn">Save</button>
        <button id="rename-cancel-btn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <!-- Separate configuration file -->
  <script src="firebase-config.js"></script>

  <script>
    // Initialize Firebase with error handling
    let db;
    try {
      if (typeof firebaseConfig === 'undefined') {
        console.warn('Firebase configuration not found. Running in local-only mode.');
        db = null;
      } else {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
      }
    } catch (error) {
      console.warn('Firebase initialization failed. Running in local-only mode.', error);
      db = null;
    }

    // Register Service Worker for offline support and cache-first performance
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => {
        console.warn('SW registration failed:', err);
      });
    }
  </script>

  <!-- Live Clock Script -->
  <script>
    (function () {
      function updateClock() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();
        var s = now.getSeconds();
        var ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12;
        if (h === 0) h = 12;
        var hh = document.getElementById('clock-hh');
        var mm = document.getElementById('clock-mm');
        var ss = document.getElementById('clock-ss');
        var ap = document.getElementById('clock-ampm');
        if (hh) hh.textContent = String(h).padStart(2, '0');
        if (mm) mm.textContent = String(m).padStart(2, '0');
        if (ss) ss.textContent = String(s).padStart(2, '0');
        if (ap) ap.textContent = '\u00a0' + ampm;
      }
      updateClock();
      setInterval(updateClock, 1000);
    })();
  </script>
  <!-- Application Modules -->
  <script defer src="js/config.js?v=125"></script>
  <script defer src="js/state.js?v=125"></script>
  <script defer src="js/utils.js?v=125"></script>
  <script defer src="js/firebase-sync.js?v=125"></script>
  <script defer src="js/render.js?v=127"></script>
  <script defer src="js/crud.js?v=125"></script>
  <script defer src="js/ui.js?v=125"></script>
  <script defer src="js/search.js?v=125"></script>
  <script defer src="js/app.js?v=125"></script>
  <div id="toast-container"></div>
  <!-- Global keyword tooltip portal — lives at body level to avoid contain:paint clipping -->
  <div id="kw-tooltip" aria-hidden="true" role="tooltip"></div>
</body>

</html>
