<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>WebsiteOrganiser</title>

  <!-- PWA Meta Tags -->
  <meta name="application-name" content="WebsiteOrganiser">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WebsiteOrganiser">
  <meta name="description"
    content="Save and organize your favorite websites and keywords with smart categorization and cloud sync.">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="msapplication-config" content="/browserconfig.xml">
  <meta name="msapplication-TileColor" content="#7b2cbf">
  <meta name="msapplication-tap-highlight" content="no">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="//www.gstatic.com">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=68">
  <link rel="stylesheet" href="add-keyword-modal.css?v=34">
  <link rel="stylesheet" href="search-bar-update.css?v=44">
  <link rel="manifest" href="manifest.json">
  <link rel="dns-prefetch" href="//www.google.com">
  <link rel="preconnect" href="https://www.google.com" crossorigin>
  <meta name="theme-color" content="#7b2cbf">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#7b2cbf">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" type="image/png" href="media/logo.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="media/logo.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icon-192.png">

</head>

<body>

  <header>
    <div class="header-row">
      <div class="header-left">
        <a href="/" class="site-logo-link">
          <img src="media/logo.png" alt="WebsiteOrganiser Logo" class="site-logo">
        </a>
        <span class="site-title">WebsiteOrganiser</span>
      </div>

      <!-- Google Search Bar (Inline) -->
      <div class="search-bar-container">
        <div class="search-bar-wrapper">
          <img src="media/google.png" alt="Google Search" class="search-icon">
          <input type="text" id="google-search-input" class="google-search-input" placeholder="Google Search..."
            autocomplete="off" spellcheck="false">
          <button id="clear-search-btn" class="clear-search-btn" style="display: none;" title="Clear">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>

        <!-- Suggestions Dropdown -->
        <div id="search-suggestions" class="search-suggestions" style="display: none;">
          <!-- Suggestions will be dynamically inserted here -->
        </div>
      </div>

      <div class="header-right">
        
        <button id="admin-btn" class="btn holo-btn">Admin Login</button>
        <button id="export-btn" class="btn holo-btn admin-only" style="display: none;">📤 Export</button>
        <button id="import-btn" class="btn holo-btn admin-only" style="display: none;">📥 Import</button>
        <input type="file" id="import-file-input" accept=".json" style="display: none;">
        <button id="theme-toggle-btn" class="btn icon-btn holo-btn"><img src="media/theme.png" alt="Theme"
            class="theme-icon"></button>
      </div>
    </div>
  </header>

  <!-- PWA Installation Prompt -->
  <!-- PWA Installation Prompt removed -->



  <main class="container">
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
      <div class="loading-spinner"></div>
      <p class="loading-text">Loading your websites...</p>
    </div>

    <div id="groups-container" class="groups-grid">
      <!-- Keyword groups will be dynamically inserted here -->
    </div>
  </main>

  <button id="add-fab" class="fab">+</button>

  <!-- Modal for adding a keyword to a group -->
  <div id="add-keyword-modal" class="modal-container">
    <div class="modal-content">
      <h2><img src="media/rename.png" style="width:24px;height:24px;margin-right:10px;vertical-align:middle;">Add Keyword</h2>
      <input type="text" id="add-keyword-input" placeholder="Enter name or link...">
      <input type="text" id="add-keyword-desc-input" placeholder="Give a comment..." style="margin-top: 10px;">
      <div class="modal-actions">
        <button id="add-keyword-save-btn" class="btn" onclick="if(window.saveNewKeyword)saveNewKeyword()">Add</button>
        <button id="add-keyword-cancel-btn" class="btn btn-secondary"
          onclick="if(window.closeAddKeywordModal)window.closeAddKeywordModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Modal for adding/editing a group -->
  <div id="group-modal" class="modal-container">
    <div class="modal-content">
      <h2 id="group-modal-title"><img src="media/rename.png" style="width:24px;height:24px;margin-right:10px;vertical-align:middle;">Create New Group</h2>
      <input type="text" id="group-name-input" placeholder="Enter group name...">
      <div class="modal-actions">
        <button id="save-group-btn" class="btn" onclick="if(window.saveGroup)window.saveGroup()">Save</button>
        <button id="cancel-group-btn" class="btn btn-secondary"
          onclick="if(window.closeGroupModal)window.closeGroupModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Modal for managing keywords -->
  <!-- Remove unrelated keyword modal, only use add-keyword-modal for group add -->

  <!-- Admin Login Modal -->
  <div id="admin-modal" class="modal-container">
    <div class="modal-content">
      <h2>🔐 Admin Login</h2>
      <input type="text" id="admin-id-input" placeholder="Enter admin ID..." autocomplete="username">
      <input type="password" id="admin-password-input" placeholder="Enter password..." autocomplete="current-password">
      <p id="admin-error-msg" style="color: #ff6b6b; display: none; margin: 8px 0;">Invalid credentials</p>
      <div class="modal-actions">
        <button id="admin-login-btn" class="btn">Login</button>
        <button id="admin-cancel-btn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Rename Keyword Modal -->
  <div id="rename-modal" class="modal-container">
    <div class="modal-content">
      <h2 id="rename-modal-title">Edit Keyword</h2>
      <input type="text" id="rename-keyword-input" placeholder="Enter new name or link...">
      <input type="text" id="rename-keyword-desc-input" placeholder="Give a comment..." style="margin-top: 10px;">
      <div class="modal-actions">
        <button id="rename-save-btn" class="btn">Save</button>
        <button id="rename-cancel-btn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <!-- Separate configuration file -->
  <script src="firebase-config.js"></script>

  <script>
    // Initialize Firebase with error handling
    let db;
    try {
      if (typeof firebaseConfig === 'undefined') {
        throw new Error('Firebase configuration not found. Please create firebase-config.js.');
      }
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
    } catch (error) {
      // Show user-friendly error without console logging
      document.body.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#1a1a2e;color:#fff;font-family:sans-serif;text-align:center;padding:20px;">
          <h1 style="color:#ff6b6b;">⚠️ Connection Error</h1>
          <p>Failed to connect to the server. Please check your internet connection and try again.</p>
          <button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;background:#7b2cbf;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem;">
            Retry
          </button>
        </div>
      `;
    }

    // Register service worker for offline caching as early as possible
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function () {
        // Silent failure - service worker is optional
      });
    }
  </script>
  <script src="script.js?v=51"></script>
  <div id="toast-container"></div>
</body>

</html>
